name: Publish Arch Repository

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-repo.yml
      - keys/**
      - packages/**

permissions:
  contents: write

jobs:
  discover:
    name: Discover packages
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    container:
      image: cachyos/cachyos-v3:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find packages
        id: discover
        run: |
          shopt -s nullglob
          for pkgbuild in packages/*/PKGBUILD; do
            package_dir="${pkgbuild%/*}"
            artifact_name="${package_dir##*/}"
            jq -n --arg package_dir "${package_dir}" --arg artifact_name "${artifact_name}" \
              '{package_dir: $package_dir, artifact_name: $artifact_name}'
          done | jq -cs . | tr -d "\n" | sed "s/^/matrix=/" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ubuntu-latest
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    container:
      image: cachyos/cachyos-v3:latest
    env:
      REPO_GPG_PRIVATE_KEY_B64: ${{ secrets.ARCH_REPO_GPG_PRIVATE_KEY_B64 }}
      REPO_GPG_KEY_ID: ${{ secrets.ARCH_REPO_GPG_KEY_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create unprivileged builder user
        run: |
          useradd -m -s /bin/bash builder
          echo 'builder ALL=(root) NOPASSWD: /usr/bin/pacman' > /etc/sudoers.d/builder-pacman
          chmod 0440 /etc/sudoers.d/builder-pacman
          chown -R builder:builder "${GITHUB_WORKSPACE}"

      - name: Validate signing secrets
        run: |
          [[ -n "${REPO_GPG_PRIVATE_KEY_B64}" ]] || (echo "Missing secret: ARCH_REPO_GPG_PRIVATE_KEY_B64" >&2; exit 1)
          [[ -n "${REPO_GPG_KEY_ID}" ]] || (echo "Missing secret: ARCH_REPO_GPG_KEY_ID" >&2; exit 1)

      - name: Import signing key for builder
        run: |
          printf '%s' "${REPO_GPG_PRIVATE_KEY_B64}" | base64 -d | sudo -u builder -- gpg --batch --import

      - name: Install build tools
        run: |
          pacman -Syu --noconfirm --needed git sudo pacman-contrib namcap gnupg

      - name: Build package
        run: |
          sudo --preserve-env=GITHUB_WORKSPACE,REPO_GPG_KEY_ID -u builder bash <<'EOF'
          cd "${GITHUB_WORKSPACE}/${{ matrix.package_dir }}"
          makepkg -sf --sign --key "${REPO_GPG_KEY_ID}" --noconfirm --needed
          EOF

      - name: Verify build artifacts
        run: |
          namcap "${{ matrix.package_dir }}/PKGBUILD" || true
          namcap "${{ matrix.package_dir }}/"*.pkg.tar.zst || true

      - name: Collect build artifacts
        run: |
          mkdir -p "build-artifacts"
          mv "${{ matrix.package_dir }}/"*.pkg.tar.* "build-artifacts/"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkgs-${{ matrix.artifact_name }}
          path: build-artifacts/*
          retention-days: 1
          if-no-files-found: error

  publish:
    name: Build repository database and publish release
    runs-on: ubuntu-latest
    needs: build
    container:
      image: cachyos/cachyos-v3:latest
    env:
      REPO_GPG_PRIVATE_KEY_B64: ${{ secrets.ARCH_REPO_GPG_PRIVATE_KEY_B64 }}
      REPO_GPG_KEY_ID: ${{ secrets.ARCH_REPO_GPG_KEY_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate signing secrets
        run: |
          [[ -n "${REPO_GPG_PRIVATE_KEY_B64}" ]] || (echo "Missing secret: ARCH_REPO_GPG_PRIVATE_KEY_B64" >&2; exit 1)
          [[ -n "${REPO_GPG_KEY_ID}" ]] || (echo "Missing secret: ARCH_REPO_GPG_KEY_ID" >&2; exit 1)

      - name: Import signing key
        run: |
          printf '%s' "${REPO_GPG_PRIVATE_KEY_B64}" | base64 -d | gpg --batch --import

      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/build-packages

      - name: Install publish tools
        run: |
          pacman -Syu --noconfirm --needed pacman-contrib gnupg

      - name: Assemble repository database
        run: |
          shopt -s globstar nullglob
          mkdir -p "${RUNNER_TEMP}/repo" && cd "${RUNNER_TEMP}/repo"
          cp -v "${RUNNER_TEMP}/build-packages/"**/*.pkg.tar.* .
          repo-add --sign --key "${REPO_GPG_KEY_ID}" electronic-mango.db.tar.gz *.pkg.tar.zst

      - name: Publish or update release assets
        uses: ncipollo/release-action@v1
        with:
          tag: repo-latest
          name: Repository
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          artifacts: "${{ runner.temp }}/repo/*"
          body: |
            Add repository configuration to `/etc/pacman.conf`:
            ```conf
            [electronic-mango]
            Server = https://github.com/Electronic-Mango/arch-repository/releases/latest/download
            ```
