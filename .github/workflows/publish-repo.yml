name: Publish Arch Repository

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-repo.yml
      - .github/actions/**
      - keys/**
      - packages/**

permissions:
  contents: write

jobs:
  discover:
    name: Discover packages
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    container:
      image: ghcr.io/electronic-mango/arch-repository-builder:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Find packages
        id: discover
        run: |
          shopt -s nullglob
          for pkgbuild in packages/*/PKGBUILD; do
            package_dir="${pkgbuild%/*}"
            artifact_name="${package_dir##*/}"
            jq -n --arg package_dir "${package_dir}" --arg artifact_name "${artifact_name}" \
              '{package_dir: $package_dir, artifact_name: $artifact_name}'
          done | jq -cs . | tr -d "\n" | sed "s/^/matrix=/" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ubuntu-latest
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    container:
      image: ghcr.io/electronic-mango/arch-repository-builder:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup signing key for builder
        uses: ./.github/actions/setup-signing
        with:
          gpg-private-key-b64: ${{ secrets.ARCH_REPO_GPG_PRIVATE_KEY_B64 }}
          gpg-key-id: ${{ secrets.ARCH_REPO_GPG_KEY_ID }}

      - name: Build package
        run: |
          cd "${{ matrix.package_dir }}"
          sudo pacman -Suy
          makepkg -sf --sign --key "${{ secrets.ARCH_REPO_GPG_KEY_ID }}" --noconfirm --needed

      - name: Verify build artifacts
        run: |
          namcap "${{ matrix.package_dir }}/PKGBUILD" || true
          namcap "${{ matrix.package_dir }}/"*.pkg.tar.zst || true

      - name: Collect build artifacts
        run: |
          mkdir -p "build-artifacts"
          mv "${{ matrix.package_dir }}/"*.pkg.tar.* build-artifacts/
          rename ':' '.' build-artifacts/* || true

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pkgs-${{ matrix.artifact_name }}
          path: build-artifacts/*
          retention-days: 1
          if-no-files-found: error

  publish:
    name: Build repository database and publish release
    runs-on: ubuntu-latest
    needs: build
    container:
      image: ghcr.io/electronic-mango/arch-repository-builder:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup signing key
        uses: ./.github/actions/setup-signing
        with:
          gpg-private-key-b64: ${{ secrets.ARCH_REPO_GPG_PRIVATE_KEY_B64 }}
          gpg-key-id: ${{ secrets.ARCH_REPO_GPG_KEY_ID }}

      - name: Download all package artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/build-packages

      - name: Assemble repository database
        run: |
          shopt -s globstar nullglob
          mkdir -p "${RUNNER_TEMP}/repo" && cd "${RUNNER_TEMP}/repo"
          cp -v "${RUNNER_TEMP}/build-packages/"**/*.pkg.tar.* .
          repo-add --sign --key "${{ secrets.ARCH_REPO_GPG_KEY_ID }}" electronic-mango.db.tar.gz *.pkg.tar.zst

      - name: Publish or update release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: repo-latest
          name: Repository
          make_latest: true
          files: "${{ runner.temp }}/repo/*"
          overwrite_files: true
          body: |
            Add repository configuration to `/etc/pacman.conf`:
            ```conf
            [electronic-mango]
            Server = https://github.com/Electronic-Mango/arch-repository/releases/latest/download
            ```
