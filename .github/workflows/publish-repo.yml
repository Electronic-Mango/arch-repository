name: Build and Publish Arch Repository

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    name: Discover packages
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find packages
        id: discover
        run: |
          echo "matrix=$(bash scripts/publish-repo/discover-json.sh packages)" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.package_dir }}
    runs-on: ubuntu-latest
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    container:
      image: archlinux:base-devel
    env:
      REPO_GPG_PRIVATE_KEY_B64: ${{ secrets.ARCH_REPO_GPG_PRIVATE_KEY_B64 }}
      REPO_GPG_KEY_ID: ${{ secrets.ARCH_REPO_GPG_KEY_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          pacman -Syu --noconfirm --needed git sudo pacman-contrib namcap gnupg

      - name: Validate signing secrets
        run: |
          [[ -n "${REPO_GPG_PRIVATE_KEY_B64}" ]] || (echo "Missing secret: ARCH_REPO_GPG_PRIVATE_KEY_B64" >&2; exit 1)
          [[ -n "${REPO_GPG_KEY_ID}" ]] || (echo "Missing secret: ARCH_REPO_GPG_KEY_ID" >&2; exit 1)

      - name: Create unprivileged builder user
        run: |
          useradd -m -s /bin/bash builder
          echo 'builder ALL=(root) NOPASSWD: /usr/bin/pacman' > /etc/sudoers.d/builder-pacman
          chmod 0440 /etc/sudoers.d/builder-pacman
          chown -R builder:builder "${GITHUB_WORKSPACE}"

      - name: Import signing key for builder
        run: |
          printf '%s' "${REPO_GPG_PRIVATE_KEY_B64}" | \
            base64 -d | \
            sudo -u builder -- gpg --batch --import

      - name: Build package and run validation
        run: |
          mkdir -p "${RUNNER_TEMP}/pkgs"
          sudo -u builder -- bash \
            "${GITHUB_WORKSPACE}/scripts/publish-repo/build-package.sh" \
            "${GITHUB_WORKSPACE}/${{ matrix.package_dir }}" \
            "${RUNNER_TEMP}/pkgs" \
            "${REPO_GPG_KEY_ID}"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkgs-${{ matrix.artifact_suffix }}
          path: ${{ runner.temp }}/pkgs/*
          retention-days: 1
          if-no-files-found: error

  publish:
    name: Build repo database and publish release
    runs-on: ubuntu-latest
    needs: build
    container:
      image: archlinux:base-devel
    env:
      REPO_GPG_PRIVATE_KEY_B64: ${{ secrets.ARCH_REPO_GPG_PRIVATE_KEY_B64 }}
      REPO_GPG_KEY_ID: ${{ secrets.ARCH_REPO_GPG_KEY_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/build-packages

      - name: Install publish tools
        run: |
          pacman -Syu --noconfirm --needed pacman-contrib gnupg

      - name: Validate signing secrets
        run: |
          [[ -n "${REPO_GPG_PRIVATE_KEY_B64}" ]] || (echo "Missing secret: ARCH_REPO_GPG_PRIVATE_KEY_B64" >&2; exit 1)
          [[ -n "${REPO_GPG_KEY_ID}" ]] || (echo "Missing secret: ARCH_REPO_GPG_KEY_ID" >&2; exit 1)

      - name: Import signing key
        run: |
          printf '%s' "${REPO_GPG_PRIVATE_KEY_B64}" | base64 -d | gpg --batch --import

      - name: Assemble repository payload
        run: |
          bash scripts/publish-repo/assemble-repo.sh "${RUNNER_TEMP}/build-packages" "${RUNNER_TEMP}/repo" "${REPO_GPG_KEY_ID}"

      - name: Publish or update release assets
        uses: ncipollo/release-action@v1
        with:
          tag: repo-latest
          name: Repository Latest
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          artifacts: "${{ runner.temp }}/repo/*"
          body: |
            Auto-published package repository payload.

            Use as pacman server:
            https://github.com/${{ github.repository }}/releases/latest/download
