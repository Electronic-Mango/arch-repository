name: Build and Publish Arch Repo

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - packages/**
  #     - scripts/**
  #     - .github/workflows/publish-repo.yml

permissions:
  contents: write

jobs:
  discover:
    name: Discover package directories
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find package directories with PKGBUILD
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          matrix_json=$(bash scripts/publish-repo/discover-json.sh packages)
          echo "matrix=${matrix_json}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.package_dir }}
    runs-on: ubuntu-latest
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    container:
      image: archlinux:base-devel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tooling
        shell: bash
        run: |
          set -euo pipefail
          pacman -Syu --noconfirm --needed git pacman-contrib namcap

      - name: Create unprivileged builder user
        shell: bash
        run: |
          set -euo pipefail
          useradd -m -s /bin/bash builder
          chown -R builder:builder "${GITHUB_WORKSPACE}"

      - name: Build package and run validation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/pkgs"
          su -s /bin/bash builder -c 'bash "$1" "$2" "$3"' _ \
            "${GITHUB_WORKSPACE}/scripts/publish-repo/build-package.sh" \
            "${GITHUB_WORKSPACE}/${{ matrix.package_dir }}" \
            "${RUNNER_TEMP}/pkgs"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkgs-${{ replace(matrix.package_dir, '/', '-') }}
          path: ${{ runner.temp }}/pkgs/*
          retention-days: 1
          if-no-files-found: error

  publish:
    name: Build repo database and publish release
    runs-on: ubuntu-latest
    needs: build
    container:
      image: archlinux:base-devel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: build-packages

      - name: Assemble repository payload
        shell: bash
        run: |
          set -euo pipefail
          pacman -Syu --noconfirm --needed pacman-contrib
          bash scripts/publish-repo/assemble-repo.sh build-packages repo

      - name: Publish or update release assets
        uses: ncipollo/release-action@v1
        with:
          tag: repo-latest
          name: Repository Latest
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          artifacts: "repo/*"
          body: |
            Auto-published package repository payload.

            Use as pacman server:
            https://github.com/${{ github.repository }}/releases/latest/download
