name: Update Packages

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    name: Discover update scripts
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find update scripts
        id: discover
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          for script in scripts/update/*.sh; do
            jq -n --arg script_path "${script}" --arg package_name "${script##*/}" \
              '{script_path: $script_path, package_name: ($package_name | sub("\\.sh$"; ""))}'
          done | jq -cs . | tr -d "\n" | xargs -i echo "matrix={}" >> "${GITHUB_OUTPUT}"

  update:
    name: Update ${{ matrix.package_name }}
    runs-on: ubuntu-latest
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run update script
        id: update
        run: |
          version="$(bash "${{ matrix.script_path }}" packages | tail -n 1)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update ${{ matrix.package_name }} to ${{ steps.update.outputs.version }}"
          title: "chore: update ${{ matrix.package_name }} to ${{ steps.update.outputs.version }}"
          branch: chore/update-${{ matrix.package_name }}
          delete-branch: true
