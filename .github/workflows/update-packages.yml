name: Update Packages

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-packages.yml
      - scripts/update/**

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    name: Discover update scripts
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    container:
      image: ghcr.io/electronic-mango/arch-repository-builder:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Find update scripts
        id: discover
        run: |
          shopt -s nullglob
          for script in scripts/update/*.sh; do
            jq -n --arg script_path "${script}" --arg package_name "$(basename "${script%.sh}")" \
              '{script_path: $script_path, package_name: $package_name}'
          done | jq -cs . | tr -d "\n" | sed "s/^/matrix=/" >> "${GITHUB_OUTPUT}"

  update:
    name: Update ${{ matrix.package_name }}
    runs-on: ubuntu-latest
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    container:
      image: ghcr.io/electronic-mango/arch-repository-builder:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run update script
        run: |
          bash "${{ matrix.script_path }}" packages
      
      - name: Get new version
        id: version
        run: |
          source "packages/${{ matrix.package_name }}/PKGBUILD"
          echo "pkgver=${pkgver}" >> "${GITHUB_OUTPUT}"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update ${{ matrix.package_name }} to ${{ steps.version.outputs.pkgver }}"
          title: "chore: update ${{ matrix.package_name }} to ${{ steps.version.outputs.pkgver }}"
          branch: update/${{ matrix.package_name }}
          delete-branch: true
          reviewers: Electronic-Mango
