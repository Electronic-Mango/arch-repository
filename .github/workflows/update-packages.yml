name: Update Packages

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    name: Discover update scripts
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find update scripts
        id: discover
        run: |
          for script in scripts/update/*.sh; do
            jq -n --arg script_path "${script}" --arg package_name "$(basename "${script%.sh}")" \
              '{script_path: $script_path, package_name: $package_name}'
          done | jq -cs . | tr -d "\n" | sed "s/^/matrix=/" >> "${GITHUB_OUTPUT}"

  update:
    name: Update ${{ matrix.package_name }}
    runs-on: ubuntu-latest
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run update script
        run: |
          bash "${{ matrix.script_path }}" packages
      
      - name: Get new version
        id: version
        run: |
          grep '^pkgver=' "packages/${{ matrix.package_name }}/PKGBUILD" >> "${GITHUB_OUTPUT}"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "update: ${{ matrix.package_name }} to ${{ steps.version.outputs.pkgver }}"
          title: "update: ${{ matrix.package_name }} to ${{ steps.version.outputs.pkgver }}"
          branch: update/${{ matrix.package_name }}
          delete-branch: true
